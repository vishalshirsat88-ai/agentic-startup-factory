<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script src="https://cdn.tailwindcss.com"></script>
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{{ product_name }}</title>
    <meta name="description" content="{{ product_meta_description }}" />
    <meta name="keywords" content="{{ product_keywords }}" />

    <!-- Favicons -->
    <link
      href="{{ url_for('static', filename='assets/img/favicon.png') }}"
      rel="icon"
    />
    <link
      href="{{ url_for('static', filename='assets/img/apple-touch-icon.png') }}"
      rel="apple-touch-icon"
    />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Nunito:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- Vendor CSS Files -->
    <link
      href="{{ url_for('static', filename='assets/vendor/bootstrap/css/bootstrap.min.css') }}"
      rel="stylesheet"
    />
    <link
      href="{{ url_for('static', filename='assets/vendor/bootstrap-icons/bootstrap-icons.css') }}"
      rel="stylesheet"
    />
    <link
      href="{{ url_for('static', filename='assets/vendor/aos/aos.css') }}"
      rel="stylesheet"
    />
    <link
      href="{{ url_for('static', filename='assets/vendor/glightbox/css/glightbox.min.css') }}"
      rel="stylesheet"
    />
    <link
      href="{{ url_for('static', filename='assets/vendor/swiper/swiper-bundle.min.css') }}"
      rel="stylesheet"
    />

    <link
      href="{{ url_for('static', filename='assets/css/main.css') }}"
      rel="stylesheet"
    />

    <!-- =======================================================
  * Template Name: FlexStart
  * Template URL: https://bootstrapmade.com/flexstart-bootstrap-startup-template/
  * Updated: Nov 01 2024 with Bootstrap v5.3.3
  * Author: BootstrapMade.com
  * License: https://bootstrapmade.com/license/
  ======================================================== -->
  </head>

  <body class="bg-white">

    <!-- NAVBAR -->
    <nav class="fixed top-0 w-full z-50 bg-black/30 backdrop-blur-lg px-6 py-4 flex justify-between items-center">

      <!-- LOGO -->
      <div class="flex flex-col leading-tight">
        <span class="text-xl font-bold text-white">
          {{ product_name }}
        </span>
        <span class="text-xs text-white/60">
          {{ product_tagline }}
        </span>
      </div>

      <!-- NAV LINKS -->
      <div class="hidden md:flex gap-6">
        <a class="text-white/80 hover:text-white transition">Home</a>
        <a class="text-white/80 hover:text-white transition">About</a>
        <a class="text-white/80 hover:text-white transition">Services</a>
        <a class="text-white/80 hover:text-white transition">Contact</a>
      </div>

      <!-- CTA -->
      <a href="/dashboard" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">
        Get Access
      </a>

    </nav>

    <!-- GENERATED UI -->
    {{ header_section | safe }}
    {{ features_section | safe }}

  </body>
</html>
