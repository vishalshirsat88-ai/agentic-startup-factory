
<section class="py-20 max-w-6xl mx-auto grid md:grid-cols-3 gap-8">
    {% for feature in data.features %}
    <div class="p-6 bg-gray-900 rounded-xl">
        <h3 class="text-xl font-bold mb-2">
            {{ feature.title }}
        </h3>
        <p class="text-gray-400">
            {{ feature.desc }}
        </p>
    </div>
    {% endfor %}
</section>
