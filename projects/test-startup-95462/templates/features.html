
<section class="py-20 max-w-6xl mx-auto grid md:grid-cols-3 gap-8">
    {% for feature in data.features %}
    <div class="p-6 bg-gray-900 rounded-xl">
        <h3 class="text-xl font-bold mb-2">
            {{ feature.title }}
        </h3>
        <p class="text-gray-400">
            {{ feature.desc }}
        </p>
    </div>
    {% endfor %}
</section>

<!-- 🔥 AUTO-INJECTED-FETCH -->
<script>
fetch('/api/data')
  .then(res => res.json())
  .then(data => {
      const container = document.getElementById('app-data');
      if (!container) return;

      container.innerHTML = '';

      if (typeof data === 'object') {
          Object.keys(data).forEach(key => {
              const div = document.createElement('div');
              div.innerText = key + ": " + JSON.stringify(data[key]);
              container.appendChild(div);
          });
      } else {
          container.innerText = data;
      }
  })
  .catch(err => console.error(err));
</script>

<div id="app-data" style="padding:20px;"></div>
